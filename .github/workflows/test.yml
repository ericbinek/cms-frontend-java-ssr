name: test

on: [push, pull_request]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: '25'
      - run: |
          find src -name '*.java' > sources.txt
          javac -d out @sources.txt
          java -cp out cms.test.TestRunner
