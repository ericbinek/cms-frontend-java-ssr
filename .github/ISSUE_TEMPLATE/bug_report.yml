name: Bug report
description: Something does not behave the way the conformance tests would suggest
labels: ["bug"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for the report. This is a work in progress, so please include enough detail to reproduce.
  - type: textarea
    id: summary
    attributes:
      label: What happened
      description: What did you do, and what did you expect instead?
    validations:
      required: true
  - type: textarea
    id: repro
    attributes:
      label: Steps to reproduce
      description: A request against a running server is ideal.
      render: shell
      placeholder: |
        java -cp out cms.Server
        open http://localhost:4006/
    validations:
      required: true
  - type: input
    id: runtime
    attributes:
      label: JDK version
      description: Output of `java -version`
      placeholder: "25"
    validations:
      required: true
