name: cms-frontend-java-ssr

services:
  app:
    container_name: cms-frontend-java-ssr
    build: .
    ports:
      - "4006:4006"
    extra_hosts:
      - "host.docker.internal:host-gateway"
    environment:
      PORT: "4006"
      API_BASE_URL: "${API_BASE_URL:-http://host.docker.internal:3006}"
